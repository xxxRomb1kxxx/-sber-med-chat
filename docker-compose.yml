version: '3.9'

services:
  frontend:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./public:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

  backend:
    build:
      context: ../simulator_for_doctors_FASTAPI-main
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - GIGACHAT_API_KEY=${GIGACHAT_API_KEY}
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

